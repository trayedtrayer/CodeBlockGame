<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Code</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <aside class="blocks-palette">
            <h2>Блоки</h2>

            <div class="category">
                <button class="category-title">Переменные</button>
                <div class="category-content">
                    <div class="block block--var" draggable="true" data-type="var-declare">let x = ...</div>
                    <div class="block block--var" draggable="true" data-type="var-assign">x = ...</div>
                    <div class="block block--var" draggable="true" data-type="var-change">x += ...</div>
                </div>
            </div>

            <div class="category">
                <button class="category-title">Циклы</button>
                <div class="category-content">
                    <div class="block block--loop" draggable="true" data-type="loop-for">for ( ; ; )</div>
                    <div class="block block--loop" draggable="true" data-type="loop-for-of">for ... of</div>
                    <div class="block block--loop" draggable="true" data-type="loop-while">while (...)</div>
                </div>
            </div>

            <div class="category">
                <button class="category-title">Условия</button>
                <div class="category-content">
                    <div class="block block--cond" draggable="true" data-type="if-block">если (if)</div>
                    <div class="block block--cond" draggable="true" data-type="else-if-block">иначе если</div>
                    <div class="block block--cond" draggable="true" data-type="else-block">иначе (else)</div>
                </div>
            </div>

            <div class="category">
                <button class="category-title">Функции</button>
                <div class="category-content">
                    <div class="block block--func" draggable="true" data-type="func-declare">function f( )</div>
                    <div class="block block--func" draggable="true" data-type="func-call">вызов f( )</div>
                    <div class="block block--func" draggable="true" data-type="func-return">return</div>
                </div>
            </div>

            <div class="category">
                <button class="category-title">Управление</button>
                <div class="category-content">
                    <div class="block block--flow" draggable="true" data-type="break">break</div>
                    <div class="block block--flow" draggable="true" data-type="continue">continue</div>
                </div>
            </div>

            <div class="category">
                <button class="category-title">Вывод</button>
                <div class="category-content">
                    <div class="block block--output" draggable="true" data-type="console-log">console.log( )</div>
                    <div class="block block--output" draggable="true" data-type="alert">alert( )</div>
                </div>
            </div>
        </aside>

        <main id="workspace" class="workspace">
            <p class="workspace-hint">Перетаскивай блоки сюда...</p>
        </main>

        <section class="output">
            <h3>▶ Вывод</h3>
            <div id="output-content"></div>
        </section>
    </div>

    <button id="run-button" class="run-button">▶Запуск</button>
    <script src="scripts/script.js"></script>
</body>
</html>
