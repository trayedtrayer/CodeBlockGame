<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Code</title>
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>
    <header class="head">
        <span class="logo">logo</span>
    </header>
        <div class="container">
            <aside id="blocks-palette" class = "blocks-palette">
                <h2>Блоки</h2>
                <div class="category" id="category-var">
                    <button class = "category-title">Переменные</button>
                    <div class="category-content">
                        <div class="block" draggable="true" data-type="variable-create">
                            Создать переменную
                        </div>
                        <div class = "block" draggable="true" data-type="variable-set">
                            Установить значение
                        </div>
                    </div>
                </div>

                <div class="category" id="category-loops">
                    <button class = "category-title">Циклы</button>
                    <div class="category-content">
                        <div class="block" draggable="true" data-type="loop-for">
                            Создать цикл for
                        </div>
                        <div class = "block" draggable="true" data-type="loop-while">
                            Создать цикл while
                        </div>
                    </div>
                </div>

                <div class="category" id="category-conditions">
                    <button class = "category-title">Условия</button>
                    <div class="category-content">
                        <div class="block" draggable="true" data-type="if-block">
                            Создать условие if
                        </div>
                        <div class = "block" draggable="true" data-type="if-else-block">
                            Создать условие if-else
                        </div>
                    </div>
                </div>

                <div class="category" id="category-functions">
                    <button class = "category-title">Функции</button>
                    <div class="category-content">
                        <div class="block" draggable="true" data-type="create-function">
                            Создать функции
                        </div>
                        <div class = "block" draggable="true" data-type="call-function">
                            Вызвать функцию
                        </div>
                    </div>
                </div>

                <div class="category" id="category-output">
                    <button class = "category-title">Вывод</button>
                    <div class="category-content">
                        <div class="block" draggable="true" data-type="console-log">
                            console.log()
                        </div>
                        <div class = "block" draggable="true" data-type="alert">
                            alert()
                        </div>
                    </div>
                </div>
            </aside>

            <main id="workspace" class="workspace">
            <p style="color: #303030;">Перетаскивай блоки сюда...</p>
        </main>

        <section id="output" class="output">
            <h2>Вывод:</h2>
            <div id="output-content"></div>
        </section>
    </div>

    <button id="run-button" class="run-button">Запуск</button>

    <script src="scripts/script.js"></script>
</body>

</html>
